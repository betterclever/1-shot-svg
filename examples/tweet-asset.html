<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1-shot-svg Tweet Asset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;650;750;850&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 1600px;
      height: 900px;
      margin: 0;
      overflow: hidden;
      background: #f5efe4;
      color: #17130f;
      font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: 1600px;
      height: 900px;
      padding: 42px;
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 161, 103, 0.38), transparent 34%),
        radial-gradient(circle at 88% 16%, rgba(71, 171, 214, 0.28), transparent 32%),
        radial-gradient(circle at 78% 84%, rgba(164, 121, 255, 0.18), transparent 34%),
        linear-gradient(135deg, #fbf6ee 0%, #f2eadf 48%, #eef7f4 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.34;
      background-image:
        linear-gradient(rgba(28, 20, 13, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28, 20, 13, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .stage::after {
      content: "vector friendly · generated asset · local trace · same ask ·";
      position: absolute;
      left: 160px;
      top: 160px;
      width: 520px;
      color: rgba(28, 20, 13, 0.08);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 28px;
      line-height: 1.55;
      letter-spacing: 0.12em;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 1516px;
      height: 816px;
      display: grid;
      grid-template-columns: 0.78fr 1.22fr;
      gap: 38px;
      padding: 58px;
      border: 1px solid rgba(31, 24, 17, 0.14);
      border-radius: 34px;
      background: rgba(255, 252, 246, 0.74);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        0 38px 120px rgba(91, 72, 52, 0.18);
      backdrop-filter: blur(24px);
    }

    .intro {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .eyebrow {
      color: #7d58e8;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 34px 0 0;
      max-width: 560px;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 104px;
      line-height: 0.86;
      letter-spacing: 0;
      font-weight: 400;
    }

    .accent {
      color: #7150e7;
      font-style: italic;
    }

    .sub {
      max-width: 500px;
      margin: 28px 0 0;
      color: rgba(23, 19, 15, 0.68);
      font-size: 31px;
      line-height: 1.16;
      font-weight: 720;
    }

    .install {
      width: fit-content;
      padding: 15px 18px;
      border: 1px solid rgba(23, 19, 15, 0.14);
      border-radius: 16px;
      color: #3d2d92;
      background: rgba(255, 255, 255, 0.66);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 19px;
      font-weight: 760;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-self: center;
      min-width: 0;
    }

    .panel {
      position: relative;
      display: grid;
      grid-template-rows: 58px 360px auto;
      gap: 16px;
      min-width: 0;
      height: 596px;
      padding: 22px;
      border: 1px solid rgba(23, 19, 15, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.52);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 20px 46px rgba(70, 52, 35, 0.11);
    }

    .panel.skill {
      background:
        linear-gradient(180deg, rgba(197, 255, 222, 0.5), rgba(255, 255, 255, 0.54)),
        rgba(255, 255, 255, 0.52);
      border-color: rgba(53, 154, 99, 0.23);
    }

    .label {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      color: rgba(23, 19, 15, 0.92);
      font-size: 25px;
      line-height: 1;
      font-weight: 900;
    }

    .pill {
      padding: 8px 10px 9px;
      border-radius: 999px;
      background: rgba(23, 19, 15, 0.07);
      color: rgba(23, 19, 15, 0.58);
      font-size: 15px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 850;
      white-space: nowrap;
    }

    .skill .pill {
      background: rgba(53, 154, 99, 0.13);
      color: #236d43;
    }

    .art {
      display: grid;
      place-items: center;
      width: 360px;
      height: 360px;
      justify-self: center;
      min-height: 0;
      overflow: hidden;
      border-radius: 0;
      background: transparent;
    }

    .art img {
      width: 94%;
      height: 94%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 24px 30px rgba(70, 52, 35, 0.2));
    }

    .skill .art img {
      width: 94%;
      height: 94%;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr;
      align-content: end;
      gap: 8px;
      padding-top: 2px;
      color: rgba(23, 19, 15, 0.62);
      font-size: 21px;
      font-weight: 730;
    }

    .metric strong {
      color: #17130f;
      font-size: 36px;
      font-weight: 950;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="card">
      <div class="intro">
        <div>
          <div class="eyebrow">new skill</div>
          <h1>Get beautiful SVGs in <span class="accent">1 shot</span></h1>
          <p class="sub">Same ask. Better asset pipeline. Generate, trace, compare, ship.</p>
        </div>
        <div class="install">npx skills add betterclever/1-shot-svg</div>
      </div>

      <div class="compare" aria-label="Standard Codex SVG versus 1-shot-svg output">
        <article class="panel">
          <div class="label">
            <span>GPT-5.5 xhigh</span>
            <span class="pill">7.5 KB</span>
          </div>
          <div class="art">
          <img src="pelican-gpt55-xhigh.png" alt="Codex GPT-5.5 XHigh pelican riding a bicycle SVG output">
          </div>
          <div class="metric">
            <span>direct SVG</span>
            <strong>7.5 KB</strong>
          </div>
        </article>

        <article class="panel skill">
          <div class="label">
            <span>1-shot-svg</span>
            <span class="pill">46.8 KB</span>
          </div>
          <div class="art">
            <img src="pelican-skill-vector-aware.png" alt="1-shot-svg pelican riding a bicycle SVG output">
          </div>
          <div class="metric">
            <span>imagegen → VTracer</span>
            <strong>46.8 KB</strong>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
